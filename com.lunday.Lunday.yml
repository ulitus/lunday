app-id: com.lunday.Lunday
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: lunday
finish-args:
  - --share=network
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.freedesktop.portal.Desktop
  - --talk-name=org.freedesktop.secrets
  - --filesystem=xdg-download:rw
  - --filesystem=home:ro
modules:
  - name: monday
    buildsystem: simple
    build-commands:
      - install -Dm755 lunday.py /app/bin/lunday
      - install -Dm644 com.lunday.Lunday.desktop /app/share/applications/com.lunday.Lunday.desktop
      - install -Dm644 com.lunday.Lunday.metainfo.xml /app/share/metainfo/com.lunday.Lunday.metainfo.xml
      - install -Dm644 com.lunday.Lunday.svg /app/share/icons/hicolor/scalable/apps/com.lunday.Lunday.svg
      - install -Dm644 notify.wav /app/share/sounds/notify.wav
    sources:
      - type: file
        url: https://raw.githubusercontent.com/ulitus/lunday/main/assets/lunday.py
        sha256: 7db00cb2ab22b9ac3eabef93cda0950539e21eb0cf07e0edf2633a4ee24ef68d
      - type: file
        url: https://raw.githubusercontent.com/ulitus/lunday/main/assets/com.lunday.Lunday.desktop
        sha256: c4877aeffb6cb580d983ebe05350274d231f880dccc79755efe8b5ddefdf32ef
      - type: file
        url: https://raw.githubusercontent.com/ulitus/lunday/main/assets/com.lunday.Lunday.metainfo.xml
        sha256: 68d1816aa6134fa6e1d870dc7f39aa0c04054503ef024f1c1e8071e4f2ced902
      - type: file
        url: https://raw.githubusercontent.com/ulitus/lunday/main/assets/com.lunday.Lunday.svg
        sha256: d09e8843006fad7c8c3c0533936675e3f150d447ff2188167dcf31d5bf9c4efe
      - type: file
        url: https://raw.githubusercontent.com/ulitus/lunday/main/assets/notify.wav
        sha256: 551c9e9a322d29efb24582b7465d8c5605338bd263d5c84eb93c148cf0648d48
