<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f1f2e"/>
      <stop offset="100%" stop-color="#2d2d44"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="256" height="256" rx="48" fill="url(#bgGradient)" />

  <!-- Colored bars (task lines) -->
  <rect x="60" y="70" width="140" height="20" rx="10" fill="#ff5c5c"/>
  <rect x="60" y="110" width="100" height="20" rx="10" fill="#ffb84d"/>
  <rect x="60" y="150" width="120" height="20" rx="10" fill="#4dd2ff"/>

  <!-- Left dots (status indicators) -->
  <circle cx="40" cy="80" r="8" fill="#ff5c5c"/>
  <circle cx="40" cy="120" r="8" fill="#ffb84d"/>
  <circle cx="40" cy="160" r="8" fill="#4dd2ff"/>

  <!-- Subtle "L" mark -->
